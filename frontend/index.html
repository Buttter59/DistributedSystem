<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatIT</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans&display=swap" rel="stylesheet">
<style>
body { font-family:'DM Sans'; background:#0f172a; color:white; margin:0;}
header {display:flex;justify-content:space-between;padding:15px 30px;background:#111827;}
.container {display:flex;height:calc(100vh - 60px);}
.sidebar {width:200px;background:#020617;padding:10px;}
.chat {flex:1;display:flex;flex-direction:column;}
.messages {flex:1;overflow-y:auto;padding:10px;}
.input-area {display:flex;padding:10px;}
input {flex:1;padding:10px;}
button {padding:10px;background:#38bdf8;border:none;}
</style>
</head>
<body>
<header><div>💬 ChatIT</div></header>
<div class="container">
<div class="sidebar">Commands:<br>/nick<br>/msg</div>
<div class="chat">
<div id="messages" class="messages"></div>
<div class="input-area">
<input id="username" placeholder="Username">
<input id="message" placeholder="Message">
<button onclick="sendMessage()">Send</button>
</div>
</div>
</div>
<script>
let socket = new WebSocket("ws://localhost:3000");
socket.onmessage = e => {
 let div = document.createElement("div");
 div.innerText = e.data;
 document.getElementById("messages").appendChild(div);
};
function sendMessage(){
 let user=document.getElementById("username").value;
 let msg=document.getElementById("message").value;
 socket.send(msg.startsWith("/")?msg:user+": "+msg);
}
</script>
</body>
</html>
